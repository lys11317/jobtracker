<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Tracker v1.4.5</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Dashboard</p>
        <h1>Job Tracker v1.4.5</h1>
      </div>
      <div class="header-actions">
        <button class="button button-secondary" id="export-csv-button" type="button">导出 CSV</button>
        <button class="button button-primary" id="add-record-button" type="button">新增记录</button>
      </div>
    </header>

    <section class="summary-grid" aria-label="求职状态概览">
      <article class="summary-card">
        <span class="summary-label">总投递</span>
        <strong id="summary-total">0</strong>
      </article>
      <article class="summary-card">
        <span class="summary-label">等待回复</span>
        <strong id="summary-waiting">0</strong>
      </article>
      <article class="summary-card">
        <span class="summary-label">面试中</span>
        <strong id="summary-interview">0</strong>
      </article>
      <article class="summary-card">
        <span class="summary-label">Offer</span>
        <strong id="summary-offer">0</strong>
      </article>
      <article class="summary-card">
        <span class="summary-label">已关闭</span>
        <strong id="summary-closed">0</strong>
      </article>
    </section>

    <section class="toolbar" aria-label="筛选工具">
      <label class="field field-search">
        <span>搜索</span>
        <input id="search-input" type="search" placeholder="公司、职位、渠道、备注">
      </label>
      <label class="field field-filter">
        <span>投递状态</span>
        <select id="status-filter">
          <option value="">全部状态</option>
        </select>
      </label>
      <label class="field field-sort">
        <span>排序</span>
        <select id="sort-select">
          <option value="status">状态顺序</option>
          <option value="appliedDateDesc">投递时间：新到旧</option>
          <option value="appliedDateAsc">投递时间：旧到新</option>
          <option value="statusUpdatedDateDesc">状态更新时间：新到旧</option>
          <option value="statusUpdatedDateAsc">状态更新时间：旧到新</option>
        </select>
      </label>
      <div class="field field-import">
        <span>数据迁移</span>
        <button class="button button-secondary" id="import-csv-button" type="button">导入 CSV</button>
        <input class="hidden-file-input" id="import-csv-input" type="file" accept=".csv,text/csv">
      </div>
    </section>

    <section class="table-panel" aria-label="求职记录列表">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>公司名称</th>
              <th>申请职位</th>
              <th>投递时间</th>
              <th>投递渠道</th>
              <th>职位链接/JD链接</th>
              <th>查看投递状态界面</th>
              <th>投递状态</th>
              <th>状态更新时间</th>
              <th>备注</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="records-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog class="record-dialog" id="record-dialog">
    <form id="job-form" method="dialog">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">Application</p>
          <h2 id="dialog-title">新增求职记录</h2>
        </div>
        <button class="icon-button" id="close-dialog-button" type="button" aria-label="关闭">×</button>
      </div>

      <input id="record-id" name="id" type="hidden">

      <div class="form-grid">
        <label class="field">
          <span>公司名称</span>
          <input name="company" type="text" required>
        </label>
        <label class="field">
          <span>申请职位</span>
          <input name="role" type="text" required>
        </label>
        <label class="field">
          <span>投递时间</span>
          <input name="appliedDate" type="date" required>
        </label>
        <label class="field">
          <span>投递渠道</span>
          <input name="channel" type="text">
        </label>
        <label class="field">
          <span>职位链接/JD链接</span>
          <input name="jobLink" type="url">
        </label>
        <label class="field">
          <span>查看投递状态界面</span>
          <input name="statusLink" type="url">
        </label>
        <label class="field">
          <span>投递状态</span>
          <select id="status-select" name="status" required></select>
        </label>
        <label class="field">
          <span>状态更新时间</span>
          <input name="statusUpdatedDate" type="date" required>
        </label>
        <label class="field field-full">
          <span>备注</span>
          <textarea name="notes" rows="4" placeholder="公司名称、职位或时间可能来自页面标题、域名或页面描述，保存前请确认。"></textarea>
        </label>
      </div>

      <div class="dialog-actions">
        <button class="button button-secondary" id="cancel-button" type="button">取消</button>
        <button class="button button-primary" type="submit">保存记录</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
